address: "0.0.0.0"
port: 9118
metricsPath: "/metrics"
log:
  level: "debug"
  log_path: "/var/log/uos-exporter/network_exporter.log"

# 监控配置
conf:
  refresh: 15m
  # nameserver: 8.8.8.8:53 # Optional
  nameserver_timeout: 250ms # Optional

icmp:
  interval: 3s
  timeout: 1s
  count: 6

mtr:
  interval: 3s
  timeout: 500ms
  max-hops: 30
  count: 6

tcp:
  interval: 3s
  timeout: 1s

http_get:
  interval: 15m

