address: "0.0.0.0"
port: 9076
metrics_path: "/metrics"
logging:
  level: "info"
  log_path: "/var/log/uos-exporter/ssl_exporter.log"
  max_size: "100MB"
  max_age: 7

# SSL特定配置
ssl:
  default_module: https
  targets:
    - name: "uniontech_com"
      url: "uniontech.com:443"
      module: "https"
  modules:
    https:
      prober: https
    tcp:
      prober: tcp
    tcp_smtp_starttls:
      prober: tcp
      tcp:
        starttls: smtp
